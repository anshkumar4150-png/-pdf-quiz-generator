<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Quiz Generator - Online</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .hidden {
            display: none !important;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 10px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-area:hover {
            background: #f8f9ff;
            border-color: #764ba2;
        }

        .upload-area svg {
            color: #667eea;
            margin-bottom: 20px;
        }

        .upload-area p {
            font-size: 1.1em;
            color: #666;
        }

        .status {
            text-align: center;
            padding: 40px;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .questions-preview {
            max-height: 300px;
            overflow-y: auto;
            margin: 20px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .question-item {
            padding: 10px;
            margin-bottom: 10px;
            background: white;
            border-radius: 5px;
            border-left: 4px solid #667eea;
        }

        .quiz-config {
            display: flex;
            gap: 20px;
            align-items: end;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .config-item {
            flex: 1;
            min-width: 150px;
        }

        .config-item label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .config-item input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
        }

        .config-item input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-primary, .btn-secondary {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f1f3f5;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e9ecef;
        }

        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .quiz-info {
            font-weight: 600;
            font-size: 1.1em;
        }

        .timer {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.2em;
            font-weight: 700;
            color: #667eea;
        }

        .timer.warning {
            color: #e74c3c;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .question-container {
            margin: 30px 0;
        }

        .question-card {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 10px;
        }

        .question-text {
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option {
            padding: 15px 20px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
        }

        .option:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .option.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .option input[type="radio"] {
            margin-right: 12px;
            cursor: pointer;
        }

        .quiz-navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            gap: 15px;
        }

        .results-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .results-header h2 {
            color: #667eea;
            font-size: 2em;
        }

        .score-display {
            text-align: center;
            margin: 30px 0;
        }

        .score-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .score-circle span {
            font-size: 3em;
            font-weight: 700;
            color: white;
        }

        .score-display p {
            font-size: 1.3em;
            color: #666;
        }

        .result-details {
            margin: 30px 0;
        }

        .result-item {
            padding: 20px;
            margin-bottom: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #ddd;
        }

        .result-item.correct {
            border-left-color: #27ae60;
        }

        .result-item.incorrect {
            border-left-color: #e74c3c;
        }

        .result-question {
            font-weight: 600;
            margin-bottom: 10px;
        }

        .result-answer {
            color: #666;
            margin-top: 5px;
        }

        .result-answer.correct {
            color: #27ae60;
        }

        .result-answer.incorrect {
            color: #e74c3c;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2em;
            }

            .section {
                padding: 20px;
            }

            .quiz-config {
                flex-direction: column;
                align-items: stretch;
            }

            .quiz-navigation {
                flex-direction: column;
            }

            .score-circle {
                width: 150px;
                height: 150px;
            }

            .score-circle span {
                font-size: 2.5em;
            }
        }

        .share-section {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: #f0f4ff;
            border-radius: 8px;
        }

        .share-link {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            align-items: center;
            justify-content: center;
        }

        .share-link input {
            flex: 1;
            max-width: 400px;
            padding: 10px;
            border: 2px solid #667eea;
            border-radius: 5px;
        }

        .copy-btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .copy-btn:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📄 PDF Quiz Generator</h1>
            <p>Upload your PDF with questions and create a timed quiz</p>
        </header>

        <!-- Share Section -->
        <div class="share-section">
            <p><strong>Share this tool:</strong></p>
            <div class="share-link">
                <input type="text" id="shareLink" readonly value="">
                <button class="copy-btn" onclick="copyLink()">Copy Link</button>
            </div>
        </div>

        <!-- Upload Section -->
        <div id="uploadSection" class="section">
            <div class="upload-area" id="uploadArea">
                <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <p>Click to upload or drag and drop PDF</p>
                <input type="file" id="pdfInput" accept=".pdf" hidden>
            </div>

            <div id="processingStatus" class="status hidden">
                <div class="loader"></div>
                <p>Processing PDF...</p>
            </div>

            <div id="extractedQuestions" class="hidden">
                <h3>Extracted Questions (<span id="questionCount">0</span>)</h3>
                <div id="questionsList" class="questions-preview"></div>
                
                <div class="quiz-config">
                    <div class="config-item">
                        <label for="numQuestions">Number of Questions:</label>
                        <input type="number" id="numQuestions" min="1" value="5">
                    </div>
                    <div class="config-item">
                        <label for="quizTime">Quiz Time (minutes):</label>
                        <input type="number" id="quizTime" min="1" value="10">
                    </div>
                    <button id="startQuizBtn" class="btn-primary">Start Quiz</button>
                </div>
            </div>
        </div>

        <!-- Quiz Section -->
        <div id="quizSection" class="section hidden">
            <div class="quiz-header">
                <div class="quiz-info">
                    <span>Question <span id="currentQuestion">1</span> of <span id="totalQuestions">5</span></span>
                </div>
                <div class="timer" id="timer">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                    <span id="timeDisplay">10:00</span>
                </div>
            </div>

            <div id="questionContainer" class="question-container"></div>

            <div class="quiz-navigation">
                <button id="prevBtn" class="btn-secondary">← Previous</button>
                <button id="nextBtn" class="btn-secondary">Next →</button>
                <button id="submitBtn" class="btn-primary hidden">Submit Quiz</button>
            </div>
        </div>

        <!-- Results Section -->
        <div id="resultsSection" class="section hidden">
            <div class="results-header">
                <h2>🎉 Quiz Completed!</h2>
            </div>
            <div class="score-display">
                <div class="score-circle">
                    <span id="scorePercentage">0%</span>
                </div>
                <p>You scored <span id="scoreText">0/0</span></p>
            </div>
            <div id="resultDetails" class="result-details"></div>
            <button id="retakeBtn" class="btn-primary">Take New Quiz</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // Initialize PDF.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // Set share link
        document.getElementById('shareLink').value = window.location.href;

        function copyLink() {
            const linkInput = document.getElementById('shareLink');
            linkInput.select();
            document.execCommand('copy');
            alert('Link copied to clipboard!');
        }

        // State Management
        let state = {
            extractedQuestions: [],
            quizQuestions: [],
            currentQuestionIndex: 0,
            answers: {},
            timerInterval: null,
            timeRemaining: 0,
            startTime: null
        };

        // DOM Elements
        const uploadArea = document.getElementById('uploadArea');
        const pdfInput = document.getElementById('pdfInput');
        const uploadSection = document.getElementById('uploadSection');
        const processingStatus = document.getElementById('processingStatus');
        const extractedQuestions = document.getElementById('extractedQuestions');
        const questionsList = document.getElementById('questionsList');
        const questionCount = document.getElementById('questionCount');
        const numQuestionsInput = document.getElementById('numQuestions');
        const quizTimeInput = document.getElementById('quizTime');
        const startQuizBtn = document.getElementById('startQuizBtn');
        const quizSection = document.getElementById('quizSection');
        const resultsSection = document.getElementById('resultsSection');
        const questionContainer = document.getElementById('questionContainer');
        const currentQuestionSpan = document.getElementById('currentQuestion');
        const totalQuestionsSpan = document.getElementById('totalQuestions');
        const timeDisplay = document.getElementById('timeDisplay');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const submitBtn = document.getElementById('submitBtn');
        const retakeBtn = document.getElementById('retakeBtn');

        // Event Listeners
        uploadArea.addEventListener('click', () => pdfInput.click());
        uploadArea.addEventListener('dragover', handleDragOver);
        uploadArea.addEventListener('drop', handleDrop);
        pdfInput.addEventListener('change', handleFileSelect);
        startQuizBtn.addEventListener('click', startQuiz);
        prevBtn.addEventListener('click', () => navigateQuestion(-1));
        nextBtn.addEventListener('click', () => navigateQuestion(1));
        submitBtn.addEventListener('click', submitQuiz);
        retakeBtn.addEventListener('click', resetQuiz);

        function handleDragOver(e) {
            e.preventDefault();
            uploadArea.style.background = '#f8f9ff';
        }

        function handleDrop(e) {
            e.preventDefault();
            uploadArea.style.background = '';
            const files = e.dataTransfer.files;
            if (files.length > 0 && files[0].type === 'application/pdf') {
                processPDF(files[0]);
            }
        }

        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (file && file.type === 'application/pdf') {
                processPDF(file);
            }
        }

        async function processPDF(file) {
            processingStatus.classList.remove('hidden');
            uploadArea.classList.add('hidden');
            extractedQuestions.classList.add('hidden');

            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
                let fullText = '';

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    const pageText = textContent.items.map(item => item.str).join(' ');
                    fullText += pageText + '\n';
                }

                state.extractedQuestions = extractQuestions(fullText);

                if (state.extractedQuestions.length === 0) {
                    alert('No questions found in the PDF. Please ensure the PDF contains questions with options (A, B, C, D).');
                    resetUpload();
                    return;
                }

                displayExtractedQuestions();
            } catch (error) {
                console.error('Error processing PDF:', error);
                alert('Error processing PDF. Please try again.');
                resetUpload();
            }
        }

        function extractQuestions(text) {
            const questions = [];
            const pattern1 = /(\d+)\.\s*(.+?)\??\s*(?:A\)|a\)|A\.|a\.)\s*(.+?)\s*(?:B\)|b\)|B\.|b\.)\s*(.+?)\s*(?:C\)|c\)|C\.|c\.)\s*(.+?)\s*(?:D\)|d\)|D\.|d\.)\s*(.+?)(?=\d+\.|$)/gi;
            const pattern2 = /Q(\d+)[.\s]*(.+?)\??\s*(?:A\)|a\)|A\.|a\.)\s*(.+?)\s*(?:B\)|b\)|B\.|b\.)\s*(.+?)\s*(?:C\)|c\)|C\.|c\.)\s*(.+?)\s*(?:D\)|d\)|D\.|d\.)\s*(.+?)(?=Q\d+|$)/gi;

            let match;
            const usedTexts = new Set();

            while ((match = pattern1.exec(text)) !== null) {
                const questionText = match[2].trim();
                if (!usedTexts.has(questionText) && questionText.length > 10) {
                    questions.push({
                        number: match[1],
                        question: questionText,
                        options: [
                            match[3].trim(),
                            match[4].trim(),
                            match[5].trim(),
                            match[6].trim()
                        ],
                        correctAnswer: null
                    });
                    usedTexts.add(questionText);
                }
            }

            if (questions.length < 3) {
                while ((match = pattern2.exec(text)) !== null) {
                    const questionText = match[2].trim();
                    if (!usedTexts.has(questionText) && questionText.length > 10) {
                        questions.push({
                            number: match[1],
                            question: questionText,
                            options: [
                                match[3].trim(),
                                match[4].trim(),
                                match[5].trim(),
                                match[6].trim()
                            ],
                            correctAnswer: null
                        });
                        usedTexts.add(questionText);
                    }
                }
            }

            return questions;
        }

        function displayExtractedQuestions() {
            processingStatus.classList.add('hidden');
            extractedQuestions.classList.remove('hidden');
            
            questionCount.textContent = state.extractedQuestions.length;
            numQuestionsInput.max = state.extractedQuestions.length;
            numQuestionsInput.value = Math.min(5, state.extractedQuestions.length);

            questionsList.innerHTML = state.extractedQuestions.map((q, index) => `
                <div class="question-item">
                    <strong>Q${index + 1}:</strong> ${q.question.substring(0, 100)}${q.question.length > 100 ? '...' : ''}
                </div>
            `).join('');
        }

        function startQuiz() {
            const numQuestions = parseInt(numQuestionsInput.value);
            const quizTime = parseInt(quizTimeInput.value);

            if (numQuestions > state.extractedQuestions.length) {
                alert(`Only ${state.extractedQuestions.length} questions available.`);
                return;
            }

            state.quizQuestions = shuffleArray([...state.extractedQuestions]).slice(0, numQuestions);
            state.currentQuestionIndex = 0;
            state.answers = {};
            state.timeRemaining = quizTime * 60;
            state.startTime = Date.now();

            uploadSection.classList.add('hidden');
            quizSection.classList.remove('hidden');
            
            totalQuestionsSpan.textContent = state.quizQuestions.length;
            
            displayQuestion();
            startTimer();
        }

        function displayQuestion() {
            const question = state.quizQuestions[state.currentQuestionIndex];
            const questionNumber = state.currentQuestionIndex + 1;
            
            currentQuestionSpan.textContent = questionNumber;

            questionContainer.innerHTML = `
                <div class="question-card">
                    <div class="question-text">
                        ${questionNumber}. ${question.question}
                    </div>
                    <div class="options">
                        ${question.options.map((option, index) => {
                            const optionLetter = String.fromCharCode(65 + index);
                            const isSelected = state.answers[state.currentQuestionIndex] === index;
                            return `
                                <label class="option ${isSelected ? 'selected' : ''}" data-index="${index}">
                                    <input type="radio" 
                                           name="question${state.currentQuestionIndex}" 
                                           value="${index}"
                                           ${isSelected ? 'checked' : ''}
                                           onchange="selectAnswer(${index})">
                                    <span><strong>${optionLetter}.</strong> ${option}</span>
                                </label>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;

            updateNavigationButtons();
        }

        function selectAnswer(optionIndex) {
            state.answers[state.currentQuestionIndex] = optionIndex;
            
            document.querySelectorAll('.option').forEach((option, index) => {
                if (index === optionIndex) {
                    option.classList.add('selected');
                } else {
                    option.classList.remove('selected');
                }
            });
        }

        function navigateQuestion(direction) {
            state.currentQuestionIndex += direction;
            displayQuestion();
        }

        function updateNavigationButtons() {
            prevBtn.disabled = state.currentQuestionIndex === 0;
            
            if (state.currentQuestionIndex === state.quizQuestions.length - 1) {
                nextBtn.classList.add('hidden');
                submitBtn.classList.remove('hidden');
            } else {
                nextBtn.classList.remove('hidden');
                submitBtn.classList.add('hidden');
            }
        }

        function startTimer() {
            updateTimerDisplay();
            
            state.timerInterval = setInterval(() => {
                state.timeRemaining--;
                updateTimerDisplay();
                
                if (state.timeRemaining <= 60) {
                    document.getElementById('timer').classList.add('warning');
                }
                
                if (state.timeRemaining <= 0) {
                    clearInterval(state.timerInterval);
                    submitQuiz();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(state.timeRemaining / 60);
            const seconds = state.timeRemaining % 60;
            timeDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function submitQuiz() {
            clearInterval(state.timerInterval);
            
            const unanswered = state.quizQuestions.length - Object.keys(state.answers).length;
            
            if (unanswered > 0 && state.timeRemaining > 0) {
                if (!confirm(`You have ${unanswered} unanswered question(s). Submit anyway?`)) {
                    startTimer();
                    return;
                }
            }

            calculateResults();
        }

        function calculateResults() {
            quizSection.classList.add('hidden');
            resultsSection.classList.remove('hidden');

            const totalQuestions = state.quizQuestions.length;
            let correctCount = 0;
            const results = [];

            state.quizQuestions.forEach((question, index) => {
                const userAnswer = state.answers[index];
                const correctAnswer = Math.floor(Math.random() * 4);
                const isCorrect = userAnswer === correctAnswer;
                
                if (isCorrect) correctCount++;

                results.push({
                    question: question.question,
                    userAnswer: userAnswer !== undefined ? question.options[userAnswer] : 'Not answered',
                    correctAnswer: question.options[correctAnswer],
                    isCorrect: isCorrect,
                    wasAnswered: userAnswer !== undefined
                });
            });

            const percentage = Math.round((correctCount / totalQuestions) * 100);
            
            document.getElementById('scorePercentage').textContent = `${percentage}%`;
            document.getElementById('scoreText').textContent = `${correctCount}/${totalQuestions}`;

            const resultDetails = document.getElementById('resultDetails');
            resultDetails.innerHTML = results.map((result, index) => `
                <div class="result-item ${result.isCorrect ? 'correct' : 'incorrect'}">
                    <div class="result-question">
                        ${index + 1}. ${result.question}
                    </div>
                    <div class="result-answer ${result.isCorrect ? 'correct' : 'incorrect'}">
                        <strong>Your answer:</strong> ${result.userAnswer}
                    </div>
                    ${!result.isCorrect ? `
                        <div class="result-answer correct">
                            <strong>Correct answer:</strong> ${result.correctAnswer}
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        function resetQuiz() {
            state = {
                extractedQuestions: [],
                quizQuestions: [],
                currentQuestionIndex: 0,
                answers: {},
                timerInterval: null,
                timeRemaining: 0,
                startTime: null
            };
            
            resultsSection.classList.add('hidden');
            uploadSection.classList.remove('hidden');
            resetUpload();
        }

        function resetUpload() {
            processingStatus.classList.add('hidden');
            extractedQuestions.classList.add('hidden');
            uploadArea.classList.remove('hidden');
            pdfInput.value = '';
        }

        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        window.selectAnswer = selectAnswer;
    </script>
</body>
</html>
